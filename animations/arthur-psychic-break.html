<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#05060a" />
  <title>Arthur — The Ceiling Gives Way</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f8f2e7;
      --muted: #b9ad9c;
      --panel: rgba(7, 9, 14, 0.72);
      --line: rgba(248, 242, 231, 0.16);
      --gold: #d0ad68;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      overflow: hidden;
      background: #05060a;
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      touch-action: manipulation;
      user-select: none;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background: #05060a;
    }

    .hud {
      position: fixed;
      left: max(14px, env(safe-area-inset-left));
      right: max(14px, env(safe-area-inset-right));
      top: max(14px, env(safe-area-inset-top));
      display: flex;
      justify-content: space-between;
      gap: 12px;
      pointer-events: none;
      z-index: 4;
    }

    .title-card,
    .controls {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: linear-gradient(135deg, rgba(8, 10, 16, 0.72), rgba(18, 22, 31, 0.44));
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.38);
      backdrop-filter: blur(12px);
    }

    .title-card {
      width: min(520px, 72vw);
      padding: 12px 14px;
    }

    .eyebrow {
      margin: 0 0 4px;
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 0.66rem;
      font-weight: 800;
    }

    h1 {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(1.3rem, 4.8vw, 2.35rem);
      line-height: 0.96;
      letter-spacing: -0.04em;
      text-shadow: 0 8px 24px rgba(0, 0, 0, 0.55);
    }

    .controls {
      align-self: start;
      padding: 8px;
      pointer-events: auto;
      display: flex;
      gap: 8px;
    }

    button {
      appearance: none;
      border: 1px solid rgba(208, 173, 104, 0.34);
      border-radius: 999px;
      padding: 9px 12px;
      color: var(--ink);
      background: rgba(208, 173, 104, 0.13);
      font: inherit;
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.04em;
    }

    .caption {
      position: fixed;
      left: 50%;
      bottom: max(24px, env(safe-area-inset-bottom));
      width: min(860px, calc(100vw - 28px));
      transform: translateX(-50%);
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: linear-gradient(135deg, rgba(5, 6, 10, 0.74), rgba(18, 21, 29, 0.46));
      color: #eee3d1;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(1.02rem, 3.4vw, 1.35rem);
      line-height: 1.3;
      text-align: center;
      letter-spacing: 0.01em;
      box-shadow: 0 16px 50px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(10px);
      opacity: 0;
      transition: opacity 420ms ease;
      z-index: 3;
      pointer-events: none;
    }

    .caption.visible { opacity: 1; }

    .tap-note {
      position: fixed;
      right: max(14px, env(safe-area-inset-right));
      bottom: max(14px, env(safe-area-inset-bottom));
      color: rgba(248, 242, 231, 0.56);
      font-size: 0.72rem;
      pointer-events: none;
      z-index: 2;
    }

    @media (max-width: 640px) {
      .hud {
        align-items: flex-start;
      }

      .title-card {
        width: min(72vw, 360px);
        padding: 10px 12px;
      }

      .controls {
        padding: 6px;
      }

      button {
        padding: 8px 10px;
        font-size: 0.72rem;
      }

      .tap-note { display: none; }
    }
  </style>
</head>
<body>
  <canvas id="scene" aria-label="Animated psychic battle scene: Arthur holds back, then the room of the world gives way."></canvas>

  <div class="hud">
    <div class="title-card">
      <p class="eyebrow">Arthur / animated scene</p>
      <h1>The Ceiling Gives Way</h1>
    </div>
    <div class="controls" aria-label="Animation controls">
      <button id="replay" type="button">Replay</button>
    </div>
  </div>

  <div id="caption" class="caption"></div>
  <div class="tap-note">tap to replay</div>

  <script>
    const canvas = document.getElementById("scene");
    const ctx = canvas.getContext("2d", { alpha: false });
    const captionEl = document.getElementById("caption");
    const replayBtn = document.getElementById("replay");

    let width = 0;
    let height = 0;
    let dpr = 1;
    let startedAt = performance.now();
    let lastCaption = "";

    const duration = 32;
    const debris = [];
    const glass = [];
    const dust = [];
    const sparks = [];

    const rand = (min, max) => min + Math.random() * (max - min);
    const clamp = (v, min, max) => Math.max(min, Math.min(max, v));
    const easeInOut = (x) => x < 0.5 ? 2 * x * x : 1 - Math.pow(-2 * x + 2, 2) / 2;
    const easeOut = (x) => 1 - Math.pow(1 - x, 3);
    const easeIn = (x) => x * x * x;
    const pulse = (t, speed = 1) => (Math.sin(t * speed) + 1) / 2;
    const between = (t, a, b) => clamp((t - a) / (b - a), 0, 1);

    function resize() {
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      width = Math.floor(window.innerWidth);
      height = Math.floor(window.innerHeight);
      canvas.width = Math.floor(width * dpr);
      canvas.height = Math.floor(height * dpr);
      canvas.style.width = width + "px";
      canvas.style.height = height + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      seedScene();
    }

    function seedScene() {
      debris.length = 0;
      glass.length = 0;
      dust.length = 0;
      sparks.length = 0;

      for (let i = 0; i < 130; i++) {
        debris.push({
          x: rand(-0.08, 1.08),
          y: rand(0.42, 0.9),
          base: rand(0.18, 1),
          r: rand(1.2, 4.8),
          a: rand(0, Math.PI * 2),
          spin: rand(-1.6, 1.6),
          lift: rand(0.04, 0.34),
          side: rand(-0.08, 0.08),
          delay: rand(0, 1)
        });
      }

      for (let i = 0; i < 70; i++) {
        glass.push({
          x: rand(0.06, 0.94),
          y: rand(0.2, 0.62),
          len: rand(8, 30),
          a: rand(-0.7, 0.7),
          speed: rand(0.4, 1.4),
          delay: rand(0, 1)
        });
      }

      for (let i = 0; i < 160; i++) {
        dust.push({
          x: rand(0, 1),
          y: rand(0.18, 0.95),
          r: rand(0.8, 3.2),
          speed: rand(0.05, 0.22),
          phase: rand(0, Math.PI * 2),
          opacity: rand(0.08, 0.26)
        });
      }

      for (let i = 0; i < 90; i++) {
        sparks.push({
          x: rand(0.18, 0.92),
          y: rand(0.18, 0.76),
          len: rand(4, 16),
          phase: rand(0, Math.PI * 2),
          speed: rand(1.5, 5),
          hot: Math.random() > 0.35
        });
      }
    }

    function reset() {
      startedAt = performance.now();
      lastCaption = "";
      captionEl.classList.remove("visible");
    }

    window.addEventListener("resize", resize, { passive: true });
    replayBtn.addEventListener("click", reset);
    canvas.addEventListener("click", reset);
    resize();

    function captionFor(t) {
      if (t < 2.2) return "";
      if (t < 6.4) return "The first move belongs to the other psychic. Not power. Timing.";
      if (t < 11.2) return "Arthur gives ground because there are people behind him, glass above him, traffic still moving in the dark.";
      if (t < 16.8) return "The trap tightens. For three seconds it almost looks like winning.";
      if (t < 22.8) return "Then the street understands what Arthur has been doing: holding it together.";
      if (t < 27.8) return "He stops choosing a ceiling.";
      if (t < 31.2) return "The other psychic is still alive because Arthur notices himself in time.";
      return "";
    }

    function setCaption(text) {
      if (text === lastCaption) return;
      lastCaption = text;
      if (!text) {
        captionEl.classList.remove("visible");
        return;
      }
      captionEl.textContent = text;
      captionEl.classList.add("visible");
    }

    function background(t, shakeX, shakeY, rupture) {
      const g = ctx.createLinearGradient(0, 0, 0, height);
      g.addColorStop(0, `rgb(${Math.floor(5 + rupture * 22)}, ${Math.floor(7 + rupture * 18)}, ${Math.floor(13 + rupture * 28)})`);
      g.addColorStop(0.52, `rgb(${Math.floor(11 + rupture * 34)}, ${Math.floor(13 + rupture * 22)}, ${Math.floor(20 + rupture * 36)})`);
      g.addColorStop(1, "#05060a");
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, width, height);

      ctx.save();
      ctx.translate(shakeX * 0.4, shakeY * 0.35);

      const horizon = height * 0.62;
      ctx.fillStyle = "rgba(12, 15, 22, 0.92)";
      ctx.fillRect(0, horizon, width, height - horizon);

      ctx.fillStyle = "rgba(24, 29, 38, 0.84)";
      ctx.beginPath();
      ctx.moveTo(0, horizon);
      ctx.lineTo(width, horizon - height * 0.04);
      ctx.lineTo(width, horizon + height * 0.035);
      ctx.lineTo(0, horizon + height * 0.08);
      ctx.closePath();
      ctx.fill();

      for (let i = 0; i < 6; i++) {
        const x = width * (0.08 + i * 0.17);
        const bh = height * randStable(i, 0.2, 0.48);
        ctx.fillStyle = `rgba(${14 + i}, ${18 + i}, ${28 + i * 2}, 0.72)`;
        ctx.fillRect(x, horizon - bh, width * 0.12, bh);

        const flicker = pulse(t * (2.4 + i * 0.31) + i, 1);
        ctx.fillStyle = `rgba(208, 173, 104, ${0.05 + flicker * 0.15})`;
        for (let y = horizon - bh + 16; y < horizon - 20; y += 28) {
          ctx.fillRect(x + 12, y, width * 0.02, 6);
          ctx.fillRect(x + width * 0.07, y + 6, width * 0.018, 5);
        }
      }

      for (let i = 0; i < 5; i++) {
        const x = width * (0.13 + i * 0.2);
        const broken = between(t, 7 + i * 0.75, 8.7 + i * 0.75);
        const glow = (1 - broken) * (0.38 + pulse(t * 10 + i) * 0.28) + rupture * 0.36;
        ctx.strokeStyle = "rgba(81, 86, 95, 0.72)";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(x, horizon + 10);
        ctx.lineTo(x + width * 0.015, height * 0.31);
        ctx.stroke();
        ctx.fillStyle = `rgba(224, 190, 120, ${glow})`;
        ctx.beginPath();
        ctx.ellipse(x + width * 0.018, height * 0.31, 9 + rupture * 16, 6 + rupture * 8, -0.2, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.restore();
    }

    function randStable(seed, min, max) {
      const n = Math.sin(seed * 999.123) * 43758.5453;
      return min + (n - Math.floor(n)) * (max - min);
    }

    function drawDust(t, pressure, rupture) {
      ctx.save();
      for (const p of dust) {
        const swirl = pressure * 22 + rupture * 70;
        const x = p.x * width + Math.sin(t * p.speed + p.phase) * (18 + swirl);
        const y = p.y * height + Math.cos(t * p.speed * 0.8 + p.phase) * (12 + swirl * 0.4) - rupture * height * 0.1;
        ctx.fillStyle = `rgba(207, 196, 177, ${p.opacity + pressure * 0.08 + rupture * 0.14})`;
        ctx.beginPath();
        ctx.arc(x, y, p.r + rupture * 2, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    function drawDebris(t, pressure, arthurWake, rupture) {
      const cx = width * 0.46;
      const cy = height * 0.6;
      for (const d of debris) {
        const liftStart = clamp((pressure - d.delay * 0.2) / 0.9, 0, 1);
        const lift = easeOut(liftStart);
        const orbit = arthurWake * (0.4 + d.base * 0.8) + rupture * 2.2;
        let x = d.x * width + d.side * width * pressure + Math.sin(t * (0.7 + d.base) + d.a) * orbit * 42;
        let y = d.y * height - lift * d.lift * height + Math.cos(t * (0.8 + d.base) + d.a) * orbit * 28;

        if (arthurWake > 0) {
          const dx = x - cx;
          const dy = y - cy;
          const dist = Math.max(36, Math.hypot(dx, dy));
          const pull = arthurWake * 100;
          const tangent = Math.atan2(dy, dx) + Math.PI / 2;
          x += Math.cos(tangent) * pull * d.base;
          y += Math.sin(tangent) * pull * d.base;
          x += dx / dist * rupture * 130;
          y += dy / dist * rupture * 92;
        }

        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(d.a + t * d.spin + rupture * d.spin * 4);
        ctx.fillStyle = `rgba(${84 + d.base * 55}, ${82 + d.base * 45}, ${78 + d.base * 36}, ${0.55 + pressure * 0.3})`;
        ctx.fillRect(-d.r * 1.7, -d.r, d.r * 3.4, d.r * 2);
        ctx.restore();
      }
    }

    function drawGlass(t, pressure, rupture) {
      ctx.save();
      ctx.lineCap = "round";
      for (const shard of glass) {
        const active = easeOut(clamp((pressure - shard.delay * 0.25) / 0.9, 0, 1));
        if (active <= 0) continue;
        const x = shard.x * width + Math.sin(t * shard.speed + shard.delay * 4) * active * 86;
        const y = shard.y * height + Math.cos(t * shard.speed) * active * 44 - active * 58 - rupture * 160;
        const alpha = 0.12 + active * 0.34 + rupture * 0.2;
        ctx.strokeStyle = `rgba(205, 230, 255, ${alpha})`;
        ctx.lineWidth = 1 + rupture * 1.4;
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(x + Math.cos(shard.a + t) * shard.len, y + Math.sin(shard.a + t) * shard.len);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawPsychicLattice(t, trap, rupture) {
      if (trap <= 0) return;
      const ax = width * 0.39;
      const ay = height * 0.58;
      const ox = width * 0.68;
      const oy = height * 0.54;

      ctx.save();
      ctx.globalCompositeOperation = "screen";
      for (let i = 0; i < 11; i++) {
        const p = i / 10;
        const sag = Math.sin(p * Math.PI) * height * (0.09 + rupture * 0.04);
        const jitter = (Math.sin(t * 10 + i) * 3 + rupture * randStable(i + 40, -18, 18)) * trap;
        ctx.strokeStyle = `rgba(129, 184, 255, ${0.08 + trap * 0.16})`;
        ctx.lineWidth = 1 + trap * 2 + rupture * 5;
        ctx.beginPath();
        ctx.moveTo(ox + jitter, oy - i * 7);
        ctx.quadraticCurveTo(width * (0.53 + Math.sin(t + i) * 0.02), height * 0.42 - sag + jitter, ax - jitter * 0.6, ay + i * 6);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawRings(t, arthurWake, rupture) {
      const cx = width * 0.43;
      const cy = height * 0.58;
      ctx.save();
      ctx.globalCompositeOperation = "screen";
      for (let i = 0; i < 7; i++) {
        const wave = (t * 0.62 + i * 0.14) % 1;
        const radius = (46 + wave * Math.max(width, height) * 0.7) * (0.8 + rupture * 0.6);
        const alpha = (1 - wave) * (arthurWake * 0.12 + rupture * 0.18);
        ctx.strokeStyle = `rgba(236, 225, 204, ${alpha})`;
        ctx.lineWidth = 1 + rupture * 5;
        ctx.beginPath();
        ctx.arc(cx, cy, radius, 0, Math.PI * 2);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawFigure(x, y, scale, pose, aura, isArthur) {
      ctx.save();
      ctx.translate(x, y);
      ctx.scale(scale, scale);

      if (aura > 0) {
        ctx.globalCompositeOperation = "screen";
        const rg = ctx.createRadialGradient(0, -42, 6, 0, -42, 120 + aura * 100);
        if (isArthur) {
          rg.addColorStop(0, `rgba(255, 248, 224, ${0.18 + aura * 0.38})`);
          rg.addColorStop(0.45, `rgba(210, 173, 104, ${0.08 + aura * 0.24})`);
          rg.addColorStop(1, "rgba(210, 173, 104, 0)");
        } else {
          rg.addColorStop(0, `rgba(119, 181, 255, ${0.1 + aura * 0.24})`);
          rg.addColorStop(1, "rgba(119, 181, 255, 0)");
        }
        ctx.fillStyle = rg;
        ctx.beginPath();
        ctx.arc(0, -42, 120 + aura * 100, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalCompositeOperation = "source-over";
      }

      const lean = pose.lean || 0;
      ctx.rotate(lean);
      ctx.strokeStyle = isArthur ? "rgba(3, 3, 5, 0.96)" : "rgba(6, 8, 12, 0.94)";
      ctx.fillStyle = isArthur ? "rgba(5, 5, 7, 0.98)" : "rgba(8, 10, 14, 0.96)";
      ctx.lineCap = "round";
      ctx.lineJoin = "round";

      ctx.beginPath();
      ctx.ellipse(0, -88, 14, 16, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillRect(-14, -72, 28, 52);
      ctx.beginPath();
      ctx.moveTo(-14, -66);
      ctx.lineTo(-32 - (pose.armBack || 0), -34 + (pose.armY || 0));
      ctx.lineTo(-24 - (pose.armBack || 0), -28 + (pose.armY || 0));
      ctx.lineTo(-7, -52);
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(14, -66);
      ctx.lineTo(34 + (pose.armForward || 0), -36 + (pose.armY || 0));
      ctx.lineTo(26 + (pose.armForward || 0), -29 + (pose.armY || 0));
      ctx.lineTo(6, -52);
      ctx.closePath();
      ctx.fill();

      ctx.beginPath();
      ctx.moveTo(-9, -20);
      ctx.lineTo(-20 - (pose.legSlide || 0), 26);
      ctx.lineTo(-8 - (pose.legSlide || 0), 26);
      ctx.lineTo(2, -18);
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(9, -20);
      ctx.lineTo(16 + (pose.legBrace || 0), 26);
      ctx.lineTo(28 + (pose.legBrace || 0), 26);
      ctx.lineTo(2, -18);
      ctx.closePath();
      ctx.fill();

      if (isArthur) {
        ctx.globalCompositeOperation = "screen";
        ctx.fillStyle = `rgba(255, 237, 193, ${0.12 + aura * 0.55})`;
        ctx.beginPath();
        ctx.ellipse(-5, -91, 2.4 + aura * 1.2, 1.2, 0, 0, Math.PI * 2);
        ctx.ellipse(5, -91, 2.4 + aura * 1.2, 1.2, 0, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.restore();
    }

    function drawSparks(t, rupture) {
      if (rupture <= 0.01) return;
      ctx.save();
      ctx.globalCompositeOperation = "screen";
      ctx.lineCap = "round";
      for (const s of sparks) {
        const live = Math.sin(t * s.speed + s.phase) * 0.5 + 0.5;
        const alpha = rupture * live;
        const x = s.x * width + Math.sin(s.phase + t) * rupture * 180;
        const y = s.y * height + Math.cos(s.phase - t * 1.4) * rupture * 120;
        ctx.strokeStyle = s.hot ? `rgba(255, 232, 173, ${alpha})` : `rgba(167, 207, 255, ${alpha * 0.75})`;
        ctx.lineWidth = 1.2 + rupture * 2;
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(x + Math.cos(s.phase) * s.len * (1 + rupture), y + Math.sin(s.phase) * s.len * (1 + rupture));
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawVignette(t, rupture, whiteout) {
      const grd = ctx.createRadialGradient(width * 0.5, height * 0.5, Math.min(width, height) * 0.1, width * 0.5, height * 0.5, Math.max(width, height) * 0.72);
      grd.addColorStop(0, "rgba(0,0,0,0)");
      grd.addColorStop(0.66, `rgba(0,0,0,${0.2 - rupture * 0.12})`);
      grd.addColorStop(1, `rgba(0,0,0,${0.76 - rupture * 0.36})`);
      ctx.fillStyle = grd;
      ctx.fillRect(0, 0, width, height);

      if (whiteout > 0) {
        ctx.fillStyle = `rgba(255, 248, 232, ${whiteout})`;
        ctx.fillRect(0, 0, width, height);
      }
    }

    function loop(now) {
      let t = ((now - startedAt) / 1000) % duration;
      setCaption(captionFor(t));

      const firstPressure = easeInOut(between(t, 4.2, 11.5));
      const trap = easeInOut(between(t, 9.5, 17.5)) * (1 - between(t, 20, 23));
      const arthurWake = easeInOut(between(t, 15.2, 23.4));
      const rupture = easeInOut(between(t, 21.4, 26.2)) * (1 - easeIn(between(t, 26.2, 29.2)) * 0.7);
      const whiteout = easeInOut(between(t, 24.6, 26.8)) * (1 - easeOut(between(t, 27.1, 30.2)));
      const aftermath = easeOut(between(t, 27.2, 31.2));

      const shakeAmount = firstPressure * 2 + trap * 4 + arthurWake * 6 + rupture * 22;
      const shakeX = Math.sin(t * 37) * shakeAmount + Math.sin(t * 83) * shakeAmount * 0.35;
      const shakeY = Math.cos(t * 31) * shakeAmount * 0.72;

      ctx.save();
      background(t, shakeX, shakeY, rupture);
      ctx.translate(shakeX, shakeY);

      drawDust(t, firstPressure + trap, rupture);
      drawPsychicLattice(t, trap, rupture);
      drawDebris(t, firstPressure + trap * 0.4, arthurWake, rupture);
      drawGlass(t, firstPressure + trap * 0.5, rupture);
      drawRings(t, arthurWake, rupture);

      const ground = height * 0.72;
      const arthurX = width * (0.38 - firstPressure * 0.035 + arthurWake * 0.02);
      const opponentX = width * (0.68 + rupture * 0.04 - aftermath * 0.03);
      const scale = clamp(width / 850, 0.72, 1.15);

      drawFigure(
        arthurX,
        ground,
        scale * (1 + rupture * 0.04),
        {
          lean: -0.12 * firstPressure + 0.08 * arthurWake,
          armBack: 18 * firstPressure - 20 * arthurWake,
          armForward: 8 * firstPressure + 12 * arthurWake,
          armY: 12 * firstPressure - 10 * arthurWake,
          legSlide: 16 * firstPressure,
          legBrace: 12 * firstPressure
        },
        0.12 + arthurWake * 1.6 + rupture * 1.8,
        true
      );

      drawFigure(
        opponentX,
        ground + aftermath * 24,
        scale * (0.96 - aftermath * 0.16),
        {
          lean: 0.02 - rupture * 0.1 + aftermath * 0.4,
          armBack: -4,
          armForward: 8 - aftermath * 20,
          armY: -6 + aftermath * 28,
          legSlide: aftermath * 10,
          legBrace: -aftermath * 12
        },
        firstPressure * 0.6 + trap * 0.8 - aftermath * 0.6,
        false
      );

      drawSparks(t, rupture);

      ctx.restore();
      drawVignette(t, rupture, whiteout);

      requestAnimationFrame(loop);
    }

    requestAnimationFrame(loop);
  </script>
